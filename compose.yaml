services:
  mentekus.api:
    image: mentekus.api
    build:
      context: .
      dockerfile: Mentekus.Api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      Ollama__BaseUrl: http://ollama:11434
      Ollama__Model: qwen3:4b-instruct
      Ollama__EmbeddingModel: qwen3-embedding:0.6b
  
  ollama:
    build:
      context: ./ollama
      dockerfile: Dockerfile
    container_name: ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    restart: unless-stopped

volumes:
  ollama_data: